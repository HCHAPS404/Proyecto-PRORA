name: Publicar frontend en GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - name: Build para GitHub Pages
        run: pnpm run build
        env:
          # Por defecto /Proyecto-PRORA/; override con variable del repo.
          VITE_BASE_PATH: ${{ vars.PRORA_PAGES_BASE_PATH || format('/{0}/', github.event.repository.name) }}
          # Sin API remota → frontend en modo invitado. Defina PRORA_API_BASE_URL
          # (p. ej. https://api.ejemplo.gov.co/api/v1) para conectar el backend.
          VITE_API_BASE_URL: ${{ vars.PRORA_API_BASE_URL }}
      - name: Asegurar .nojekyll en dist
        run: |
          touch dist/.nojekyll
          test -f dist/index.html
          echo "Pages URL esperada: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Resumen de enlaces
        run: |
          echo "### PRORA en GitHub Pages" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Sitio:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Inicio:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/#/inicio" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Panorama:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/#/panorama" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Repo:** https://github.com/${{ github.repository }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Si definió \`PRORA_API_BASE_URL\`, el frontend llamará a esa API (CORS debe permitir el origen de Pages)." >> "$GITHUB_STEP_SUMMARY"
